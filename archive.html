<body>
  <div id="app">
    <header class="header">
      <div class="header-side left">
        <a class="back-link" href="index.html" aria-label="게임으로 돌아가기">← 게임으로</a>
      </div>
      <h1 class="title">지난 문제</h1>
      <div class="header-side right"></div>
    </header>
    <main style="flex:1; overflow-y:auto;">
      <ul class="archive-list" id="archive-list"></ul>
      <p class="archive-note">오늘의 정답은 자정(한국 시간) 이후에 공개돼요.</p>
    </main>
  </div>
  <script type="module">
    import { getPuzzleNumber, getAnswerForPuzzle } from './js/words.js';

    const todayNum = getPuzzleNumber();
    const $list = document.getElementById('archive-list');
    if (todayNum <= 1) {
      const li = document.createElement('li');
      li.className = 'archive-item';
      li.innerHTML = '<span class="num">아직 지난 문제가 없어요</span><span class="word today">내일 만나요!</span>';
      $list.appendChild(li);
    } else {
      for (let n = todayNum - 1; n >= 1; n--) {
        const li = document.createElement('li');
        li.className = 'archive-item';
        li.innerHTML = `<span class="num">꼬들 #${n}</span><span class="word">${getAnswerForPuzzle(n)}</span>`;
        $list.appendChild(li);
      }
    }
  </script>
</body>
</html>
